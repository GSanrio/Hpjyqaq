<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QAQ家族大转盘</title>
    <link rel="stylesheet" href="Demo.css">
</head>
<body>
    <div class="rotate-lock" aria-hidden="true">
        <div class="rotate-lock-card">
            <p class="rotate-lock-label">移动端提示</p>
            <h2>请横屏查看</h2>
            <p>为了保证转盘和操作区完整显示，手机端竖屏会显示横屏提示，横屏后自动恢复完整界面。</p>
        </div>
    </div>

    <div class="sky-bg"></div>
    <div class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">转盘活动模拟器</p>
                <h1>QAQ家族大转盘</h1>
                <p class="subcopy">内圈 5 个图标决定属性，外圈 12 格决定星级。普通追加按规则判定，保护追加第 3 次必成。</p>
            </div>
        </header>

        <main class="main-layout">
            <section class="wheel-panel panel">
                <div class="wheel-stage">
                    <div class="cosmic-wheel">
                        <div class="pointer outer-pointer"></div>
                        <div class="star-ring-shell">
                            <div class="star-ring" id="starRing"></div>
                        </div>

                        <div class="inner-wheel-shell">
                            <div class="pointer inner-pointer"></div>
                            <div class="core-glow"></div>
                            <div class="element-orbit" id="elementOrbit"></div>
                            <div class="center-sigil"><span>QAQ</span></div>
                        </div>
                    </div>
                </div>

                <div class="wheel-bottom">
                    <label class="skip-toggle wheel-skip-toggle">
                        <input id="skipAnimationToggle" type="checkbox">
                        <span>跳过动画</span>
                    </label>
                </div>
            </section>

            <section class="panel side-panel merged-side-panel">
                <div class="side-head">
                    <div class="header-button-group">
                        <button id="totalSpendButton" class="ghost-btn stat-btn" type="button">总消费 0</button>
                        <button id="rechargeButton" class="secondary-btn" type="button">充值</button>
                        <button id="resetButton" class="ghost-btn danger-btn" type="button">重抽</button>
                    </div>
                </div>

                <div class="side-block unified-side-block">
                    <div class="resource-strip compact-resource-strip">
                        <div class="resource-card compact-resource-card"><span class="resource-label">余额</span><strong id="balanceValue">0</strong></div>
                        <div class="resource-card compact-resource-card"><span class="resource-label">令牌</span><strong id="tokenValue">0</strong></div>
                        <div class="resource-card compact-resource-card"><span class="resource-label">徽章</span><strong id="badgeValue">0</strong></div>
                    </div>

                    <div class="star-track-card compact-track-card">
                        <div class="star-track-head">
                            <span class="tiny-label">星轨进度</span>
                            <span id="starTrackText">0 / 7 星</span>
                        </div>
                        <div class="star-track" id="starTrack"></div>
                    </div>

                    <div class="action-reward-block">
                        <div class="action-column">
                            <div class="section-title">
                                <p class="tiny-label">抽奖操作</p>
                            </div>

                            <div class="action-stack compact-action-stack">
                                <button id="drawButton" class="primary-btn">抽奖 (6)</button>
                                <button id="normalAppendButton" class="accent-btn" disabled>普通追加</button>
                                <button id="protectedAppendButton" class="accent-alt-btn" disabled>保护追加</button>
                                <button id="openClaimDialogButton" class="primary-btn" disabled>领取奖励</button>
                                <button id="openArchiveButton" class="ghost-btn archive-btn">打开记录与背包</button>
                            </div>

                            <p class="hint-line" id="costHint">保护追加费用会随当前星级变化。</p>
                            <p class="hint-line reward-hint" id="rewardHint">奖励通过领取弹窗进行选择与结算。</p>
                        </div>
                    </div>

                    <div class="reward-state" aria-hidden="true">
                        <span id="tokenRewardValue">0</span>
                        <span id="tokenRewardText">到达星级后可领取令牌。</span>
                        <span id="prizeRewardValue">NULL</span>
                        <span id="prizeRewardText">3 星开始出现物品奖励，6 星及以上可领取徽章。</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="claim-modal" id="claimModal" hidden>
        <div class="claim-modal-backdrop" id="claimModalBackdrop"></div>
        <div class="claim-modal-card" role="dialog" aria-modal="true" aria-labelledby="claimModalTitle">
            <p class="claim-modal-label">奖励选择</p>
            <h3 id="claimModalTitle">领取奖励</h3>
            <p class="claim-modal-copy" id="claimModalSummary">请在窗口内选择本轮要领取的奖励。</p>
            <div class="claim-modal-list claim-choice-list" id="claimModalList"></div>
            <div class="claim-modal-actions claim-modal-choice-actions">
                <button id="confirmClaimDialogButton" class="primary-btn" type="button">确认领取</button>
                <button id="closeClaimDialogButton" class="ghost-btn claim-close-btn" type="button">关闭</button>
            </div>
        </div>
    </div>

    <script src="Demo.js"></script>
</body>
</html>
